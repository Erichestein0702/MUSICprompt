name: Daily Reddit Fetcher

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  fetch-and-create-issue:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch Reddit Posts
        id: fetch
        env:
          MIN_UPVOTES: 50
          TARGET_COUNT: 7
        run: |
          python tools/reddit_fetcher.py
      
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];
            
            const pendingDir = 'prompts/pending';
            if (!fs.existsSync(pendingDir)) {
              core.setFailed('No pending directory found');
              return;
            }
            
            const files = fs.readdirSync(pendingDir)
              .filter(f => f.startsWith('pending_') && f.endsWith('.md'))
              .sort()
              .reverse();
            
            if (files.length === 0) {
              core.setFailed('No pending file found');
              return;
            }
            
            const content = fs.readFileSync(`${pendingDir}/${files[0]}`, 'utf8');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📥 今日待翻译 Prompt (${today})`,
              body: content,
              labels: ['translation-pending', 'automated'],
              assignees: ['Erichestein0702']
            });
            
            console.log(`Issue created: ${issue.data.html_url}`);
