name: Daily Reddit Fetcher

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  fetch-and-create-issue:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch Reddit Posts
        id: fetch
        env:
          MIN_UPVOTES: 50
          TARGET_COUNT: 7
        run: |
          python tools/reddit_fetcher.py 2>&1 | tee fetch_output.txt
          echo "fetch_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      
      - name: Check if file was created
        id: check
        run: |
          if [ -f "prompts/pending/pending_$(date +%Y-%m-%d).md" ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
            echo "file_path=prompts/pending/pending_$(date +%Y-%m-%d).md" >> $GITHUB_OUTPUT
          else
            echo "file_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Issue
        if: steps.check.outputs.file_exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];
            
            const filePath = 'prompts/pending/pending_' + today + '.md';
            const content = fs.readFileSync(filePath, 'utf8');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📥 今日待翻译 Prompt (${today})`,
              body: content,
              labels: ['translation-pending', 'automated'],
              assignees: ['Erichestein0702']
            });
            
            console.log(`Issue created: ${issue.data.html_url}`);
      
      - name: Create fallback Issue
        if: steps.check.outputs.file_exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Reddit 爬取失败 (${today})`,
              body: `## 问题说明\n\n今日 Reddit 爬取未能获取到符合条件的帖子。\n\n### 可能原因\n\n1. Reddit API 访问受限\n2. 子版块没有足够热度的帖子\n3. 网络连接问题\n\n### 建议\n\n- 检查 Actions 日志查看详细错误\n- 手动添加待翻译内容\n- 考虑调整 MIN_UPVOTES 阈值\n`,
              labels: ['fetch-failed', 'automated'],
              assignees: ['Erichestein0702']
            });
