name: Daily Reddit Fetcher

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  fetch-and-create-issue:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch Reddit Posts (RSS Feed)
        id: fetch
        env:
          REDDIT_SUBREDDITS: ${{ vars.REDDIT_SUBREDDITS || 'SunoAI,Udio,aiMusic' }}
          MIN_UPVOTES: ${{ vars.MIN_UPVOTES || '50' }}
          TARGET_COUNT: ${{ vars.TARGET_COUNT || '7' }}
        run: |
          python tools/reddit_fetcher.py 2>&1 | tee fetch_output.txt
          echo "fetch_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      
      - name: Check if file was created
        id: check
        run: |
          if [ -f "prompts/pending/pending_$(date +%Y-%m-%d).md" ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
            echo "file_path=prompts/pending/pending_$(date +%Y-%m-%d).md" >> $GITHUB_OUTPUT
          else
            echo "file_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Issue
        if: steps.check.outputs.file_exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().split('T')[0];
            
            const filePath = 'prompts/pending/pending_' + today + '.md';
            const content = fs.readFileSync(filePath, 'utf8');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📥 今日待翻译 Prompt (${today}) [RSS]`,
              body: content,
              labels: ['translation-pending', 'automated', 'rss-feed'],
              assignees: ['Erichestein0702']
            });
            
            console.log(`Issue created: ${issue.data.html_url}`);
      
      - name: Create fallback Issue
        if: steps.check.outputs.file_exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ RSS 爬取失败 (${today})`,
              body: `## 问题说明\n\n今日 Reddit RSS Feed 爬取未能获取到符合条件的帖子。\n\n### 可能原因\n\n1. 子版块暂时没有活跃帖子\n2. RSS Feed 服务暂时不可用\n3. 当前所有帖子点赞数均低于阈值 ($MIN_UPVOTES)\n\n### 建议\n\n- 检查 Actions 日志查看详细错误\n- 降低 \`MIN_UPVOTES\` 阈值（通过 Repository Variables 配置）\n- 手动添加待翻译内容到 \`prompts/pending/\`\n\n---\n\n*此 Issue 由 MUSICprompt 自动创建（RSS Feed 方式）*`,
              labels: ['fetch-failed', 'automated', 'rss-feed'],
              assignees: ['Erichestein0702']
            });
